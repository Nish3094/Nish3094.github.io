<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nishverse | Security Posture</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #020617; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b1120; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase auth guard -->
  <script type="module">
    import { auth } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.replace("/");
    });
  </script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ── ⚠️ UPDATE THIS before deploying ───────────────────────────────────
    const API = "https://nishverse-backend.onrender.com";
    // ── ⚠️ Your Nishverse AWS account ID for the CFN trust policy ─────────
    const NISHVERSE_ACCOUNT_ID = "REPLACE_WITH_YOUR_NISHVERSE_ACCOUNT_ID";

    // ── Colour tokens ──────────────────────────────────────────────────────
    const C = {
      bg: "#020617", surface: "#0b1120", card: "#0f172a",
      border: "#1e293b", border2: "#334155",
      text: "#e2e8f0", muted: "#64748b", dim: "#334155",
      green: "#22c55e", greenDim: "#166534",
      purple: "#a78bfa", purpleBg: "#1e1b4b", purpleMid: "#7c3aed",
    };

    const SEV = {
      CRITICAL: { bg:"#1c0a0a", text:"#fca5a5", border:"#7f1d1d", dot:"#ef4444" },
      HIGH:     { bg:"#1c1108", text:"#fdba74", border:"#7c2d12", dot:"#f97316" },
      MEDIUM:   { bg:"#1c1a05", text:"#fde68a", border:"#713f12", dot:"#eab308" },
      LOW:      { bg:"#071c0e", text:"#86efac", border:"#14532d", dot:"#22c55e" },
      INFO:     { bg:"#0a0f1c", text:"#93c5fd", border:"#1e3a5f", dot:"#3b82f6" },
    };

    const SVCICON = { S3:"🪣", IAM:"🔑", EC2:"💻", RDS:"🗄️", CloudTrail:"📋", VPC:"🌐", GuardDuty:"🛡️" };
    const SEVORD  = { CRITICAL:0, HIGH:1, MEDIUM:2, LOW:3, INFO:4 };

    // ── CloudFormation template + launcher ─────────────────────────────────
    const CFN_TEMPLATE = JSON.stringify({
      AWSTemplateFormatVersion: "2010-09-09",
      Description: "Nishverse Security Posture — Cross-Account Audit Role",
      Parameters: {
        NishverseAccountId: {
          Type: "String", Default: NISHVERSE_ACCOUNT_ID,
          Description: "AWS Account ID of Nishverse that will assume this role"
        },
        ExternalId: {
          Type: "String", Default: "nishverse-audit",
          Description: "External ID for trust security — keep this value"
        }
      },
      Resources: {
        NishverseAuditRole: {
          Type: "AWS::IAM::Role",
          Properties: {
            RoleName: "NishverseSecurityAuditRole",
            Description: "Read-only cross-account role for Nishverse Security Posture scanning",
            AssumeRolePolicyDocument: {
              Version: "2012-10-17",
              Statement: [{
                Effect: "Allow",
                Principal: { AWS: {"Fn::Sub": "arn:aws:iam::${NishverseAccountId}:root"} },
                Action: "sts:AssumeRole",
                Condition: { StringEquals: { "sts:ExternalId": {"Ref": "ExternalId"} } }
              }]
            },
            ManagedPolicyArns: [
              "arn:aws:iam::aws:policy/SecurityAudit",
              "arn:aws:iam::aws:policy/ReadOnlyAccess"
            ],
            Tags: [
              {Key:"CreatedBy", Value:"Nishverse"},
              {Key:"Purpose",   Value:"SecurityPostureAudit"}
            ]
          }
        }
      },
      Outputs: {
        RoleArn: {
          Description: "Paste this ARN into the Nishverse Security Posture dashboard",
          Value: {"Fn::GetAtt": ["NishverseAuditRole", "Arn"]},
          Export: {Name: "NishverseAuditRoleArn"}
        },
        ExternalId: {
          Description: "External ID — save for Nishverse config",
          Value: {"Ref": "ExternalId"}
        }
      }
    });

    function launchCloudFormation(region) {
      const url = `https://console.aws.amazon.com/cloudformation/home?region=${region}` +
        `#/stacks/create/review?stackName=NishverseSecurityAuditRole&templateBody=${encodeURIComponent(CFN_TEMPLATE)}`;
      window.open(url, "_blank");
    }

    // ── Badge ──────────────────────────────────────────────────────────────
    function Badge({ severity }) {
      const s = SEV[severity] || SEV.INFO;
      return (
        <span style={{ background:s.bg, color:s.text, border:`1px solid ${s.border}`,
          borderRadius:5, padding:"2px 8px", fontSize:11, fontWeight:700,
          letterSpacing:"0.06em", textTransform:"uppercase", flexShrink:0 }}>
          {severity}
        </span>
      );
    }

    // ── ScoreRing ──────────────────────────────────────────────────────────
    function ScoreRing({ score }) {
      const r=52, cx=62, cy=62, circ=2*Math.PI*r;
      const color = score>=80?"#16a34a":score>=60?"#d97706":"#dc2626";
      return (
        <svg width="124" height="124" viewBox="0 0 124 124">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth="9"/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="9"
            strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)}
            strokeLinecap="round" transform="rotate(-90 62 62)"
            style={{transition:"stroke-dashoffset 1.2s ease"}}/>
          <text x={cx} y={cy-5} textAnchor="middle" fill="white"
            style={{fontSize:24,fontWeight:700,fontFamily:"monospace"}}>{score}</text>
          <text x={cx} y={cy+14} textAnchor="middle" fill={C.muted}
            style={{fontSize:11}}>/ 100</text>
        </svg>
      );
    }

    // ── TerraformModal ─────────────────────────────────────────────────────
    function TerraformModal({ finding, onClose }) {
      const [text, setText] = useState("");
      const [state, setState] = useState("loading");
      const [copied, setCopied] = useState(false);

      useEffect(() => {
        const ctrl = new AbortController();
        (async () => {
          try {
            const res = await fetch(`${API}/terraform`, {
              method: "POST", signal: ctrl.signal,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ finding }),
            });
            const data = await res.json();
            setText(data.terraform || "# No fix generated");
            setState("done");
          } catch (e) {
            if (e.name !== "AbortError") setState("error");
          }
        })();
        return () => ctrl.abort();
      }, [finding]);

      const code = (() => {
        const m = text.match(/```(?:hcl|terraform)?\n?([\s\S]*?)```/);
        return m ? m[1].trim() : text.replace(/^```.*\n?/,"").replace(/```$/,"").trim();
      })();

      useEffect(() => {
        const h = (e) => e.key === "Escape" && onClose();
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, [onClose]);

      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",
          zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.border}`,
            borderRadius:16,width:"100%",maxWidth:700,maxHeight:"85vh",
            display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"20px 24px 16px",borderBottom:`1px solid ${C.border}`,
              display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexShrink:0}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <Badge severity={finding.severity}/>
                  <span style={{color:C.muted,fontSize:12}}>{finding.cis}</span>
                </div>
                <div style={{color:C.text,fontWeight:700,fontSize:15}}>{finding.title}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:4,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:C.purple,fontSize:11}}>✦</span>
                  AI-generated Terraform fix
                  {state==="loading"&&<span style={{color:C.purple,fontSize:11}}>· generating...</span>}
                  {state==="done"&&<span style={{color:C.green,fontSize:11}}>· complete</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexShrink:0}}>
                {code&&<button onClick={()=>{navigator.clipboard.writeText(code);setCopied(true);setTimeout(()=>setCopied(false),1800);}}
                  style={{background:copied?C.greenDim:C.border,color:copied?C.green:C.muted,
                    border:"none",borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>
                  {copied?"✓ Copied":"Copy"}
                </button>}
                <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18}}>✕</button>
              </div>
            </div>
            <div style={{overflowY:"auto",flex:1}}>
              <pre style={{margin:0,padding:24,background:C.bg,color:"#e2e8f0",fontSize:13,
                lineHeight:1.65,fontFamily:"'JetBrains Mono','Fira Code',monospace",
                whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                {state==="loading"
                  ? <span style={{color:C.purple,opacity:0.5}}>Generating fix from AI...</span>
                  : code||text}
              </pre>
            </div>
          </div>
        </div>
      );
    }

    // ── FloatingChat ───────────────────────────────────────────────────────
    function FloatingChat({ findings, open, onToggle }) {
      const [messages, setMessages] = useState([
        { role:"assistant", content:"Hi! I have full context of your AWS findings. Ask me anything — 'what's my riskiest resource?', 'explain the S3 risk', 'give me a remediation plan'." }
      ]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);
      useEffect(() => { if(open) setTimeout(()=>inputRef.current?.focus(),100); }, [open]);

      const send = useCallback(async () => {
        const q = input.trim();
        if (!q || loading) return;
        setInput("");
        const newHistory = [...messages, {role:"user",content:q}];
        setMessages(newHistory);
        setLoading(true);
        setMessages(m => [...m, {role:"assistant",content:""}]);

        try {
          const res = await fetch(`${API}/chat`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              messages: newHistory.filter((_,i)=>i>0).map(m=>({role:m.role,content:m.content})),
              findings,
            }),
          });
          const data = await res.json();
          const reply = data.content?.[0]?.text || data.reply || "No response.";
          setMessages(m => {
            const copy=[...m];
            copy[copy.length-1]={role:"assistant",content:reply};
            return copy;
          });
        } catch(e) {
          setMessages(m => {
            const copy=[...m];
            copy[copy.length-1]={role:"assistant",content:"Error reaching backend."};
            return copy;
          });
        }
        setLoading(false);
      }, [input, messages, loading, findings]);

      const onKey = (e) => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };

      return (
        <>
          <button onClick={onToggle} style={{position:"fixed",bottom:28,right:28,zIndex:900,
            background:open?C.purpleMid:C.card,color:"white",
            border:`1px solid ${open?C.purple:C.border}`,
            borderRadius:999,padding:"12px 20px",fontWeight:700,fontSize:14,cursor:"pointer",
            boxShadow:"0 8px 32px rgba(0,0,0,0.5)",display:"flex",alignItems:"center",gap:8,transition:"all 0.2s"}}>
            <span>{open?"✕":"✦"}</span>
            {open?"Close":"Ask AI"}
            {!open&&<span style={{background:C.purple,color:"white",fontSize:10,borderRadius:999,padding:"1px 6px",fontWeight:800}}>LIVE</span>}
          </button>

          {open&&(
            <div style={{position:"fixed",bottom:88,right:28,zIndex:901,width:380,height:520,
              background:C.card,border:`1px solid ${C.border}`,borderRadius:16,
              display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,0.6)",overflow:"hidden"}}>
              <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`,
                display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                <div style={{width:32,height:32,borderRadius:"50%",
                  background:`linear-gradient(135deg,${C.purpleMid},#2563eb)`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>✦</div>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:C.text}}>Security AI</div>
                  <div style={{fontSize:11,color:C.green,display:"flex",alignItems:"center",gap:4}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:C.green,display:"inline-block"}}/>
                    {findings.length} findings in context
                  </div>
                </div>
              </div>

              <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
                {messages.map((m,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"86%",padding:"10px 14px",borderRadius:12,
                      background:m.role==="user"?C.purpleMid:C.surface,
                      border:`1px solid ${m.role==="user"?C.purple+"44":C.border}`,
                      color:C.text,fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap",
                      borderBottomRightRadius:m.role==="user"?4:12,
                      borderBottomLeftRadius:m.role==="assistant"?4:12}}>
                      {m.content||(loading&&i===messages.length-1?<span style={{color:C.muted,fontSize:12}}>thinking...</span>:"")}
                    </div>
                  </div>
                ))}
                <div ref={bottomRef}/>
              </div>

              <div style={{padding:"12px 14px",borderTop:`1px solid ${C.border}`,flexShrink:0}}>
                <div style={{display:"flex",gap:8}}>
                  <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
                    placeholder="Ask about your AWS environment..."
                    style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,
                      borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                  <button onClick={send} disabled={!input.trim()||loading}
                    style={{background:input.trim()&&!loading?C.purpleMid:C.dim,color:"white",
                      border:"none",borderRadius:8,width:36,cursor:input.trim()&&!loading?"pointer":"not-allowed",
                      fontSize:16,transition:"background 0.2s",flexShrink:0}}>↑</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    // ── FindingCard ────────────────────────────────────────────────────────
    function FindingCard({ finding, allFindings }) {
      const [expanded, setExpanded] = useState(false);
      const [showTerraform, setShowTerraform] = useState(false);
      const [aiText, setAiText] = useState("");
      const [aiState, setAiState] = useState("idle");
      const s = SEV[finding.severity] || SEV.INFO;

      const explainRisk = async () => {
        if (aiState === "loading") return;
        setAiText(""); setAiState("loading");
        try {
          const res = await fetch(`${API}/explain`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ finding }),
          });
          const data = await res.json();
          setAiText(data.explanation || "No explanation returned.");
          setAiState("done");
        } catch(e) {
          setAiText("Failed to reach AI backend.");
          setAiState("error");
        }
      };

      return (
        <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,
          borderLeft:`3px solid ${s.dot}`,overflow:"hidden"}}>
          <div onClick={()=>setExpanded(e=>!e)}
            style={{padding:"16px 20px",cursor:"pointer",display:"flex",
              alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0}}>
              <span style={{fontSize:18,flexShrink:0}}>{SVCICON[finding.service]||"⚠️"}</span>
              <div style={{minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                  <Badge severity={finding.severity}/>
                  <span style={{color:C.muted,fontSize:12}}>{finding.service}</span>
                  <span style={{color:C.dim,fontSize:11}}>{finding.cis}</span>
                </div>
                <div style={{fontWeight:600,fontSize:14,color:C.text,
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{finding.title}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
              <button onClick={e=>{e.stopPropagation();setShowTerraform(true);}}
                style={{background:"transparent",color:C.green,border:`1px solid ${C.greenDim}`,
                  borderRadius:7,padding:"6px 12px",fontSize:12,fontWeight:600,
                  cursor:"pointer",whiteSpace:"nowrap"}}>⚡ Fix</button>
              <span style={{color:C.muted,fontSize:14,
                transform:expanded?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
            </div>
          </div>

          {expanded&&(
            <div style={{padding:"0 20px 18px",borderTop:`1px solid ${C.border}`}}>
              <p style={{color:"#94a3b8",fontSize:13,lineHeight:1.7,margin:"12px 0 10px"}}>{finding.description}</p>
              <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
                Resource: <code style={{color:"#7dd3fc",fontSize:12}}>{finding.resource}</code>
                <span style={{margin:"0 10px",color:C.dim}}>·</span>
                SOC2: <span style={{color:C.muted}}>{finding.soc2}</span>
              </div>

              {/* Inline AI explain */}
              <button onClick={explainRisk} style={{display:"inline-flex",alignItems:"center",gap:6,
                background:aiState==="loading"?C.purpleBg:"transparent",
                color:aiState==="loading"?C.purple:C.muted,
                border:`1px solid ${aiState==="loading"?C.purple+"55":C.dim}`,
                borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                <span style={{fontSize:11}}>✦</span>
                {aiState==="loading"?"Analyzing...":aiState==="done"?"Re-explain":"Explain risk"}
              </button>

              {aiText&&(
                <div style={{marginTop:12,padding:"14px 16px",
                  background:C.purpleBg+"88",border:`1px solid ${C.purple}33`,
                  borderRadius:10,fontSize:13,lineHeight:1.75,color:"#c4b5fd",
                  fontFamily:"Georgia,serif",whiteSpace:"pre-wrap"}}>
                  {aiText}
                </div>
              )}
            </div>
          )}

          {showTerraform&&<TerraformModal finding={finding} onClose={()=>setShowTerraform(false)}/>}
        </div>
      );
    }

    // ── ConnectView ────────────────────────────────────────────────────────
    function ConnectView({ onConnect }) {
      const [arn, setArn] = useState("");
      const [externalId, setExternalId] = useState("nishverse-audit");
      const [scanning, setScanning] = useState(false);
      const [scanStep, setScanStep] = useState(-1);
      const [scanLabel, setScanLabel] = useState("");
      const [error, setError] = useState("");
      const [cfnRegion, setCfnRegion] = useState("us-east-1");
      const [showCfnInfo, setShowCfnInfo] = useState(false);

      const AWS_REGIONS = [
        "us-east-1","us-east-2","us-west-1","us-west-2",
        "ap-south-1","ap-southeast-1","ap-southeast-2","ap-northeast-1",
        "eu-west-1","eu-west-2","eu-central-1","ca-central-1"
      ];

      const SCAN_STEPS = [
        "Assuming IAM Role via STS...",
        "Scanning S3 bucket configurations...",
        "Checking IAM password policy & MFA...",
        "Auditing IAM access key age...",
        "Checking EC2 security groups...",
        "Inspecting EBS volume encryption...",
        "Detecting VPC flow logs...",
        "Verifying CloudTrail configuration...",
        "Checking GuardDuty status...",
        "Auditing RDS instances...",
        "Calculating compliance score...",
      ];

      const valid = arn.includes("arn:aws:iam::");

      const connect = async () => {
        if (!valid) return;
        setScanning(true); setError(""); setScanStep(0);

        // Animate scan steps while real request runs
        let step = 0;
        const iv = setInterval(() => {
          step++;
          setScanStep(step);
          setScanLabel(SCAN_STEPS[Math.min(step, SCAN_STEPS.length-1)]);
          if (step >= SCAN_STEPS.length - 1) clearInterval(iv);
        }, 600);

        try {
          const res = await fetch(`${API}/scan`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ roleArn: arn, externalId }),
          });
          const data = await res.json();
          clearInterval(iv);

          if (!data.success) throw new Error(data.error || "Scan failed");

          setScanStep(SCAN_STEPS.length);
          setTimeout(() => onConnect({ arn, findings: data.findings, summary: data.summary, scannedAt: data.scannedAt }), 400);

        } catch(err) {
          clearInterval(iv);
          setScanning(false); setScanStep(-1);
          setError(err.message || "Connection failed. Check the Role ARN and ensure the backend is running.");
        }
      };

      return (
        <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at 30% 20%, #1e293b, ${C.bg} 60%)`,
          display:"flex",alignItems:"center",justifyContent:"center",padding:24,color:C.text}}>
          <div style={{width:"100%",maxWidth:560,textAlign:"center"}}>
            <video autoPlay muted loop playsInline style={{width:110,borderRadius:14,marginBottom:20,boxShadow:"0 0 40px rgba(34,197,94,0.25)"}}>
              <source src="https://nish3094.github.io/trademark_logo.mp4" type="video/mp4"/>
            </video>
            <h1 style={{fontSize:26,fontWeight:800,margin:"0 0 6px",letterSpacing:"-0.02em"}}>
              Nishverse Security Posture
            </h1>
            <p style={{color:C.muted,marginBottom:32,fontSize:14}}>
              Connect your AWS environment via cross-account IAM Role to scan for<br/>
              vulnerabilities, misconfigurations &amp; compliance drift.
            </p>

            {!scanning ? (
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,textAlign:"left"}}>

                {/* Step 1 — Create Role via CloudFormation */}
                <div style={{marginBottom:24}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{background:C.green,color:"black",width:22,height:22,borderRadius:"50%",
                      display:"inline-flex",alignItems:"center",justifyContent:"center",
                      fontSize:12,fontWeight:800,flexShrink:0}}>1</span>
                    <span style={{fontWeight:700,fontSize:14}}>Create the IAM Role in your AWS account</span>
                  </div>

                  <div style={{background:C.surface,borderRadius:10,padding:"12px 16px",marginBottom:12,
                    fontSize:13,color:"#94a3b8",lineHeight:1.65,borderLeft:`3px solid ${C.green}`}}>
                    Use our one-click CloudFormation template. It attaches{" "}
                    <code style={{color:"#7dd3fc"}}>SecurityAudit</code> +{" "}
                    <code style={{color:"#7dd3fc"}}>ReadOnlyAccess</code> and scopes trust to Nishverse only.
                  </div>

                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <select value={cfnRegion} onChange={e=>setCfnRegion(e.target.value)}
                      style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,
                        color:C.text,padding:"10px 12px",fontSize:13,outline:"none",
                        fontFamily:"monospace",flex:1,cursor:"pointer"}}>
                      {AWS_REGIONS.map(r=><option key={r} value={r}>{r}</option>)}
                    </select>
                    <button onClick={()=>launchCloudFormation(cfnRegion)}
                      style={{background:C.green,color:"black",border:"none",borderRadius:8,
                        padding:"10px 18px",fontWeight:800,fontSize:13,cursor:"pointer",
                        whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
                      🚀 Create Role
                    </button>
                  </div>

                  <button onClick={()=>setShowCfnInfo(h=>!h)}
                    style={{background:"none",border:"none",color:C.muted,fontSize:12,
                      cursor:"pointer",marginTop:8,padding:0,textDecoration:"underline",
                      textDecorationStyle:"dotted"}}>
                    {showCfnInfo?"Hide":"What does this create?"}
                  </button>

                  {showCfnInfo&&(
                    <div style={{marginTop:10,background:C.bg,borderRadius:8,
                      border:`1px solid ${C.border}`,padding:"12px 14px",fontSize:12,lineHeight:1.8}}>
                      <div style={{color:C.green,fontWeight:700,marginBottom:6}}>CloudFormation creates:</div>
                      {[
                        ["Role name","NishverseSecurityAuditRole"],
                        ["Policies","SecurityAudit + ReadOnlyAccess (read-only)"],
                        ["Trust","Nishverse account only"],
                        ["Condition","ExternalId: nishverse-audit"],
                        ["Stack name","NishverseSecurityAuditRole"],
                      ].map(([k,v])=>(
                        <div key={k} style={{display:"flex",gap:8}}>
                          <span style={{color:C.muted,minWidth:74}}>{k}</span>
                          <span style={{color:"#94a3b8",fontFamily:"monospace"}}>{v}</span>
                        </div>
                      ))}
                      <div style={{marginTop:8,color:C.muted,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                        After the stack completes, go to the <strong style={{color:C.text}}>Outputs</strong> tab to copy the Role ARN.
                      </div>
                    </div>
                  )}
                </div>

                {/* Divider */}
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
                  <div style={{flex:1,height:1,background:C.border}}/>
                  <span style={{color:C.dim,fontSize:12}}>then</span>
                  <div style={{flex:1,height:1,background:C.border}}/>
                </div>

                {/* Step 2 — Paste ARN */}
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <span style={{background:C.border,color:C.text,width:22,height:22,borderRadius:"50%",
                      display:"inline-flex",alignItems:"center",justifyContent:"center",
                      fontSize:12,fontWeight:800,flexShrink:0}}>2</span>
                    <span style={{fontWeight:700,fontSize:14}}>Paste the Role ARN from CloudFormation Outputs</span>
                  </div>

                  <label style={{color:C.muted,fontSize:12,fontWeight:600,letterSpacing:"0.05em",
                    textTransform:"uppercase",display:"block",marginBottom:6}}>Role ARN</label>
                  <input value={arn} onChange={e=>setArn(e.target.value)}
                    placeholder="arn:aws:iam::123456789012:role/NishverseSecurityAuditRole"
                    style={{width:"100%",background:C.bg,border:`1px solid ${valid?C.green+"66":C.border}`,
                      borderRadius:8,padding:"11px 14px",color:C.text,fontSize:13,
                      marginBottom:14,boxSizing:"border-box",fontFamily:"monospace",outline:"none",
                      transition:"border-color 0.2s"}}/>

                  <label style={{color:C.muted,fontSize:12,fontWeight:600,letterSpacing:"0.05em",
                    textTransform:"uppercase",display:"block",marginBottom:6}}>External ID</label>
                  <input value={externalId} onChange={e=>setExternalId(e.target.value)}
                    placeholder="nishverse-audit"
                    style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,
                      borderRadius:8,padding:"11px 14px",color:C.text,fontSize:13,
                      marginBottom:error?10:22,boxSizing:"border-box",fontFamily:"monospace",outline:"none"}}/>

                  {error&&<div style={{color:"#f87171",fontSize:13,marginBottom:16,lineHeight:1.5}}>{error}</div>}

                  <button onClick={connect} disabled={!valid}
                    style={{width:"100%",padding:14,background:valid?C.green:C.border,
                      color:valid?"black":C.muted,border:"none",borderRadius:999,fontWeight:800,
                      fontSize:15,cursor:valid?"pointer":"not-allowed",transition:"all 0.2s"}}>
                    Connect &amp; Scan Environment
                  </button>
                </div>
              </div>
            ) : (
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:32,textAlign:"left"}}>
                <div style={{textAlign:"center",marginBottom:24}}>
                  <div style={{width:44,height:44,border:`3px solid ${C.border}`,
                    borderTopColor:C.green,borderRadius:"50%",
                    animation:"spin 0.8s linear infinite",margin:"0 auto 14px"}}/>
                  <p style={{color:C.green,fontWeight:700,margin:0}}>Scanning AWS environment...</p>
                </div>
                {SCAN_STEPS.map((s,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",
                    opacity:i<=scanStep?1:0.25,transition:"opacity 0.3s"}}>
                    <span style={{fontSize:13}}>{i<scanStep?"✅":i===scanStep?"⏳":"⬜"}</span>
                    <span style={{fontSize:13,color:i<scanStep?C.green:i===scanStep?C.text:C.muted}}>{s}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      );
    }

    // ── DashboardView ──────────────────────────────────────────────────────
    function DashboardView({ session, onDisconnect }) {
      const { arn, findings, summary, scannedAt } = session;
      const [tab, setTab] = useState("findings");
      const [filter, setFilter] = useState("ALL");
      const [chatOpen, setChatOpen] = useState(false);

      const sorted = [...findings].sort((a,b)=>(SEVORD[a.severity]??9)-(SEVORD[b.severity]??9));
      const filtered = filter==="ALL" ? sorted : sorted.filter(f=>f.severity===filter);

      const counts = {CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0};
      findings.forEach(f=>{ if(counts[f.severity]!==undefined) counts[f.severity]++; });
      const score = Math.max(0,Math.round(100-counts.CRITICAL*18-counts.HIGH*9-counts.MEDIUM*4-counts.LOW*1));
      const cisPass = findings.filter((_,i)=>i%3!==0).length;
      const soc2Pass = findings.filter((_,i)=>i%4!==0).length;

      return (
        <div style={{minHeight:"100vh",background:C.bg,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text}}>
          {/* Topbar */}
          <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 24px",
            display:"flex",alignItems:"center",justifyContent:"space-between",height:58,
            position:"sticky",top:0,zIndex:50}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:C.green,
                boxShadow:`0 0 8px ${C.green}`,display:"inline-block"}}/>
              <span style={{fontWeight:800,fontSize:15}}>Nishverse Security Posture</span>
              <span style={{background:C.surface,color:C.muted,fontSize:11,padding:"2px 8px",
                borderRadius:4,fontFamily:"monospace"}}>
                {arn.split(":role/")[1]||arn}
              </span>
              {scannedAt&&<span style={{color:C.dim,fontSize:11}}>
                Scanned {new Date(scannedAt).toLocaleTimeString()}
              </span>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setChatOpen(o=>!o)}
                style={{background:chatOpen?C.purpleMid:C.surface,color:chatOpen?"white":C.purple,
                  border:`1px solid ${chatOpen?C.purpleMid:C.purple+"44"}`,
                  borderRadius:999,padding:"7px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                ✦ AI Chat
              </button>
              <button onClick={onDisconnect}
                style={{background:C.surface,color:C.muted,border:`1px solid ${C.border}`,
                  borderRadius:999,padding:"7px 14px",fontSize:13,cursor:"pointer"}}>
                Disconnect
              </button>
            </div>
          </div>

          <div style={{padding:24,maxWidth:1100,margin:"0 auto"}}>
            {/* Stat cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:26}}>
              {[
                {label:"Total",    value:findings.length,  color:C.muted},
                {label:"Critical", value:counts.CRITICAL,  color:"#ef4444"},
                {label:"High",     value:counts.HIGH,      color:"#f97316"},
                {label:"Medium",   value:counts.MEDIUM,    color:"#eab308"},
                {label:"Low",      value:counts.LOW,       color:C.green},
              ].map(s=>(
                <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px"}}>
                  <div style={{color:C.muted,fontSize:12,marginBottom:4}}>{s.label}</div>
                  <div style={{fontSize:28,fontWeight:800,color:s.color}}>{s.value}</div>
                </div>
              ))}
            </div>

            {/* Tabs */}
            <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,marginBottom:20}}>
              {["findings","compliance"].map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  style={{background:"none",border:"none",color:tab===t?C.green:C.muted,
                    padding:"10px 18px",fontSize:14,fontWeight:600,cursor:"pointer",
                    textTransform:"capitalize",
                    borderBottom:tab===t?`2px solid ${C.green}`:"2px solid transparent",
                    marginBottom:-1,transition:"all 0.15s"}}>{t}</button>
              ))}
            </div>

            {/* Findings tab */}
            {tab==="findings"&&(
              <>
                <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                  {["ALL","CRITICAL","HIGH","MEDIUM","LOW"].map(f=>{
                    const active=filter===f;
                    const s=f!=="ALL"?SEV[f]:null;
                    return (
                      <button key={f} onClick={()=>setFilter(f)}
                        style={{padding:"5px 14px",borderRadius:999,fontSize:12,fontWeight:700,
                          cursor:"pointer",border:"1px solid",
                          background:active?(s?s.bg:C.surface):"transparent",
                          color:active?(s?s.text:C.text):C.muted,
                          borderColor:active?(s?s.border:C.border):C.dim,
                          transition:"all 0.15s"}}>
                        {f==="ALL"?`All (${findings.length})`:`${f} (${counts[f]||0})`}
                      </button>
                    );
                  })}
                </div>
                {filtered.length===0
                  ? <div style={{textAlign:"center",padding:60,color:C.muted}}>
                      <div style={{fontSize:40,marginBottom:12}}>✅</div>
                      <p>No {filter==="ALL"?"findings":"findings at this severity level"} found.</p>
                    </div>
                  : <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {filtered.map(f=><FindingCard key={f.id} finding={f} allFindings={findings}/>)}
                    </div>
                }
              </>
            )}

            {/* Compliance tab */}
            {tab==="compliance"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:28,textAlign:"center"}}>
                  <div style={{color:C.muted,fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:18}}>Overall Score</div>
                  <ScoreRing score={score}/>
                  <div style={{marginTop:14,fontWeight:800,fontSize:18,color:score>=80?C.green:score>=60?"#f59e0b":"#ef4444"}}>
                    {score>=80?"Good":score>=60?"Needs Attention":"Critical Risk"}
                  </div>
                  <div style={{color:C.muted,fontSize:12,marginTop:4}}>{findings.length} checks performed</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {[
                    {name:"CIS AWS Foundations v1.4",    pass:cisPass,  color:"#3b82f6"},
                    {name:"SOC 2 Type II (CC Controls)", pass:soc2Pass, color:"#a78bfa"},
                  ].map(f=>{
                    const pct=Math.round(f.pass/Math.max(findings.length,1)*100);
                    return (
                      <div key={f.name} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                          <span style={{fontWeight:700,fontSize:13}}>{f.name}</span>
                          <span style={{color:f.color,fontWeight:800}}>{pct}%</span>
                        </div>
                        <div style={{background:C.surface,borderRadius:99,height:7,marginBottom:10}}>
                          <div style={{background:f.color,height:7,borderRadius:99,width:`${pct}%`,transition:"width 1s ease"}}/>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                          <span style={{color:C.green}}>✓ {f.pass} passing</span>
                          <span style={{color:"#ef4444"}}>✗ {findings.length-f.pass} failing</span>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22}}>
                    <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Control Domains</div>
                    {[["IAM & Access","IAM"],["Network Security","EC2","VPC"],["Data Protection","S3","RDS"],["Logging & Monitoring","CloudTrail","GuardDuty"]].map(([name,...svcs])=>{
                      const domainFindings = findings.filter(f=>svcs.includes(f.service));
                      return (
                        <div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                          <span style={{fontSize:13}}>{name}</span>
                          <div style={{display:"flex",gap:10}}>
                            <span style={{color:C.green,fontSize:12}}>✓ {Math.max(0,svcs.length-domainFindings.length)}</span>
                            <span style={{color:"#ef4444",fontSize:12}}>✗ {domainFindings.length}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>

          <FloatingChat findings={findings} open={chatOpen} onToggle={()=>setChatOpen(o=>!o)}/>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}`}</style>
        </div>
      );
    }

    // ── App root ───────────────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(null);
      return session
        ? <DashboardView session={session} onDisconnect={()=>setSession(null)}/>
        : <ConnectView onConnect={setSession}/>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nishverse</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    .container {
      max-width: 900px;
      padding: 20px;
      animation: fadeIn 1.5s ease-in-out;
    }

    video {
      width: 220px;
      border-radius: 16px;
      margin-bottom: 25px;
      box-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      background: #22c55e;
      color: black;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">

    <video autoplay muted loop playsinline>
      <source src="https://nish3094.github.io/trademark_logo.mp4" type="video/mp4">
    </video>

    <h1>Nishverse</h1>

    <p>Cloud Security Intelligence Platform</p>

    <button id="loginBtn" class="btn">Login with GitHub</button>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GithubAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCREdxSPT6BYh7TXISSgYPXka7fQ2xD8-8",
      authDomain: "nishverse.firebaseapp.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GithubAuthProvider();

    // If already logged in → go to dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "/dashboard.html";
      }
    });

    // Login button
    document.getElementById("loginBtn").onclick = async () => {
      await signInWithRedirect(auth, provider);
    };
  </script>

</body>
</html>

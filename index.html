<body>
  <div class="container">

    <video autoplay muted loop playsinline>
      <source src="https://nish3094.github.io/trademark_logo.mp4" type="video/mp4">
    </video>

    <h1>Nishverse</h1>
    <p>Cloud Security Intelligence Platform</p>

    <!-- LOGIN BUTTON -->
    <button id="loginBtn" class="btn">Login with GitHub</button>

    <!-- LOGGED-IN VIEW -->
    <div id="userSection" style="display:none;">

      <!-- Top Right Logout -->
      <button id="logoutBtn" style="
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 8px 16px;
        border-radius: 999px;
        border: none;
        background: #ef4444;
        color: white;
        cursor: pointer;
      ">
        Logout
      </button>

      <p id="userInfo"></p>

      <div class="buttons">
        <a href="/resume.html" class="btn">View Resume</a>
        <a href="https://github.com/nish3094" class="btn">GitHub Repos</a>
      </div>

    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GithubAuthProvider, signInWithRedirect, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCREdxSPT6BYh7TXISSgYPXka7fQ2xD8-8",
      authDomain: "nishverse.firebaseapp.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GithubAuthProvider();

    const loginBtn = document.getElementById("loginBtn");
    const userSection = document.getElementById("userSection");
    const userInfo = document.getElementById("userInfo");

    // Login
    loginBtn.onclick = async () => {
      await signInWithRedirect(auth, provider);
    };

    // Auth state
    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginBtn.style.display = "none";
        userSection.style.display = "block";
        userInfo.innerText = "Welcome, " + (user.displayName || user.email);
      } else {
        loginBtn.style.display = "block";
        userSection.style.display = "none";
      }
    });

    // Logout
    document.getElementById("logoutBtn").onclick = () => {
      signOut(auth);
    };
  </script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nishverse</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px 20px;
    }

    video {
      width: 180px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    #loginBtn {
      padding: 14px 32px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1rem;
      background: #22c55e;
      color: black;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    #loginBtn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">

    <video autoplay muted loop playsinline>
      <source src="https://nish3094.github.io/trademark_logo.mp4" type="video/mp4">
    </video>

    <h1>Welcome to Nishverse</h1>
    <p>Sign in with GitHub to continue</p>

    <button id="loginBtn">Login with GitHub</button>

  </div>

  <script type="module" src="./firebase.js"></script>
</body>
</html>

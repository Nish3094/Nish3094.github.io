#googleBtn { background: white; color: #111; }

```

  </div>

  <script type="module">
    import { auth, provider, googleProvider } from "./firebase.js";
    import {
      signInWithPopup,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const loginBtn = document.getElementById("loginBtn");
    const googleBtn = document.getElementById("googleBtn");
    const errorMsg = document.getElementById("errorMsg");

    // If already logged in, skip straight to dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.replace("/dashboard.html");
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    function resetButtons() {
      loginBtn.disabled = false;
      loginBtn.textContent = "🐙 Login with GitHub";
      googleBtn.disabled = false;
      googleBtn.textContent = "🔵 Login with Google";
    }

    // GitHub login
    loginBtn.addEventListener("click", async () => {
      loginBtn.disabled = true;
      googleBtn.disabled = true;
      loginBtn.textContent = "Opening GitHub...";
      errorMsg.style.display = "none";
      try {
        await signInWithPopup(auth, provider);
        // onAuthStateChanged fires and redirects automatically
      } catch (err) {
        console.error(err);
        showError("Login failed: " + err.message);
        resetButtons();
      }
    });

    // Google login
    googleBtn.addEventListener("click", async () => {
      googleBtn.disabled = true;
      loginBtn.disabled = true;
      googleBtn.textContent = "Opening Google...";
      errorMsg.style.display = "none";
      try {
        await signInWithPopup(auth, googleProvider);
        // onAuthStateChanged fires and redirects automatically
      } catch (err) {
        console.error(err);
        showError("Login failed: " + err.message);
        resetButtons();
      }
    });
  </script>

</body>

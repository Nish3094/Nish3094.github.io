<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nishverse</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    .container {
      max-width: 900px;
      padding: 20px;
      animation: fadeIn 1.5s ease-in-out;
    }

    video {
      width: 220px;
      border-radius: 16px;
      margin-bottom: 25px;
      box-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    p {
      color: #cbd5f5;
      font-size: 1.15rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .primary {
      background: #22c55e;
      color: black;
    }

    .primary: hover {
      background: #16a34a;
    }

    .secondary {
      border: 1px solid #334155;
      color: #cbd5f5;
    }

    .secondary: hover {
      background: #1e293b;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- 🔥 Your animation -->
    <video autoplay muted loop playsinline>
      <source src="https://nish3094.github.io/trademark_logo.mp4" type="video/mp4">
    </video>
    <script>
    if (window.location.hostname === "nish3094.github.io") {
       window.location.href = "https://nishverse.com";
      }
    </script>

    <h1>Nishanth</h1>

    <p>
      Senior Cloud Engineer • AWS • Kubernetes • Security <br>
      Designing scalable, secure, and intelligent cloud systems.
    </p>

    <div class="buttons">
      <a href="https://github.com/nish3094" class="btn primary">GitHub</a>
      <a href="/resume.html" class="btn primary">Resume</a>
    </div>

  </div>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCREdxSPT6BYh7TXISSgYPXka7fQ2xD8-8",
    authDomain: "nishverse.firebaseapp.com"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "/login.html";
    } else {
      window.location.href = "/dashboard.html";
    }
  });
</script>
</body>
</html>
